<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký License - Ban Pick System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .register-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 500px;
        }

        .register-container h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }

        input[type="password"], input[type="email"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus, input[type="email"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .info-box {
            background: #e3f2fd;
            border: 1px solid #2196f3;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            color: #1976d2;
        }

        .error-box {
            background: #ffebee;
            border: 1px solid #f44336;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            color: #c62828;
        }

        .success-box {
            background: #e8f5e8;
            border: 1px solid #4caf50;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            color: #2e7d32;
        }

        .otp-input {
            text-align: center;
            font-size: 24px;
            letter-spacing: 8px;
            font-family: 'Courier New', monospace;
        }

        .back-btn {
            background: #6c757d;
            margin-bottom: 10px;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
        }

        .countdown {
            text-align: center;
            color: #ff9800;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h1>Đăng ký tài khoản</h1>

        <!-- Step 1: Nhập thông tin -->
        <div class="step active" id="step1">
            <div class="form-group">
                <label for="emailInput">Email (đăng nhập):</label>
                <input type="email" id="emailInput" placeholder="Nhập email của bạn" required>
            </div>
            <div class="form-group">
                <label for="passwordInput">Mật khẩu:</label>
                <input type="password" id="passwordInput" placeholder="Nhập mật khẩu (ít nhất 6 ký tự)" required>
            </div>
            <div class="form-group">
                <label for="confirmPasswordInput">Xác nhận mật khẩu:</label>
                <input type="password" id="confirmPasswordInput" placeholder="Nhập lại mật khẩu" required>
            </div>
            <div class="info-box">
                <strong>Lưu ý:</strong> Email sẽ là tên đăng nhập của bạn. Chúng tôi sẽ gửi mã OTP để xác thực.
            </div>
            <button class="btn" id="sendOtpBtn">Gửi mã OTP</button>
            
            <div class="login-link">
                <p>Đã có tài khoản? <a href="/login.html">Đăng nhập ngay</a></p>
            </div>
        </div>

        <!-- Step 2: Nhập OTP -->
        <div class="step" id="step2">
            <button class="btn back-btn" id="backBtn">← Quay lại</button>
            
            <div class="info-box" id="emailSentInfo">
                Mã OTP đã được gửi đến: <strong id="sentEmail"></strong>
            </div>
            
            <div class="form-group">
                <label for="otpInput">Nhập mã OTP (6 chữ số):</label>
                <input type="text" id="otpInput" class="otp-input" placeholder="000000" maxlength="6" required>
            </div>
            
            <div class="countdown" id="countdown"></div>
            
            <button class="btn" id="verifyOtpBtn">Xác thực OTP</button>
            <button class="btn" id="resendOtpBtn" style="background: #ff9800; margin-top: 10px;">Gửi lại mã OTP</button>
        </div>

        <!-- Step 3: Thành công -->
        <div class="step" id="step3">
            <div class="success-box">
                <h3>🎉 Đăng ký thành công!</h3>
                <p>Tài khoản <strong id="successEmail"></strong> đã được tạo thành công.</p>
                <p>Tên hiển thị: <strong id="successDisplayName"></strong></p>
            </div>
            
            <button class="btn" onclick="window.location.href='/login.html'">Đăng nhập ngay</button>
        </div>

        <div id="errorMessage"></div>
    </div>

    <script src="services/api.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
